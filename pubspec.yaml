name: family_circle
description: Family group app with AI mediator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Google Sign In
  google_sign_in: ^6.2.1

  # AI - Claude API
  http: ^1.1.0

  # Media
  cached_network_image: ^3.3.1

  # Sharing
  share_plus: ^10.0.0

  # Security
  crypto: ^3.0.3

  # Utilities
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  uuid: ^4.2.2
  intl: ^0.19.0
  url_launcher: ^6.2.2

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
