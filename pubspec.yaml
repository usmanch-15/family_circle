name: family_circle
description: Family group app with AI mediator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Google Sign In
  google_sign_in: ^6.2.1

  # AI - Claude API
  http: ^1.1.0

  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.2
  file_picker: ^6.1.1

  # Utils
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  uuid: ^4.2.2
  intl: ^0.18.1
  cached_network_image: ^3.3.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env